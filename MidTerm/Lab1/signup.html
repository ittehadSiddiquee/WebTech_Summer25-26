<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignUp</title>
</head>
<body>
    <h1>STudent Registation form</h1>
    <form>
        <label for="studentname" id = name name = name>Student Name</label>
        <input type="text" placeholder="Enter your name">
        <br> <br>
        <label for="studentID" id = studentid name = studentid>Student ID:</label>
        <input type="text"  id = ID name = ID placeholder="Enter your ID">
        <br><br>
        <label for="studentDOB" id = studentdob name = studentdob>Student DOB:</label>
        <input type="date"  id = dob name = Dob>
        <br><br>
        <label for="studentEmail" id = studentemail name = studentemail>Student Email :</label>
        <input type="text"  id = email name = email placeholder="Enter your Email">
<br><br>
        <label for="gender" id = gender name = gender> Gender :</label>
        <input type="radio"  id = gender name = gender value="Male">Male
        <input type="radio"  id = gender name = gender value="Male">Female
        <br><br>
        <label for="address" id = address name = address> Address : </label>
        <textarea name="address" id="address" rows="10" cols="10"></textarea>
        <br><br>
        <input type="submit" id = submit  name = submit Value = signup


</form>
</body>
</html>
