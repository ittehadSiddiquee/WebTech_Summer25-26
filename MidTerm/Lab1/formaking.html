<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AIUB Management system</title>
</head>
<body>
    <center>
        <h1>Aiub Management system</h1>
        <h1>AIUB </h1>
        <h2>where leaders are created </h2>
    </center>
    <center>
    <h1 align="center">Registration Form </h1>
    <form>
    <table>
    <tr>
    <td>First name : </td>
    <td><input type="text"name="fname"></td>
    </tr>
    <tr>
    <td>Last name : </td>
    <td><input type="text"name="lname"></td>
    </tr>
    <tr>
    <td>Age :</td>
    <td><input type="text"name="Age"></td>
    </tr>
    <tr>
    <td>Designation :</td>
    <td>
    <input type="radio" name="Designation" value="Junior"> Junior position
    <input type="radio" name="Designation" value="Mid"> Mid position
    <input type="radio" name="Designation" value="Senior"> Senior position
    </td>
     </tr>
     <tr>
    <td>Preferred Language :</td>
    <td>
    <input type="checkbox" name="lang" value="java">Java                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
    <input type="checkbox" name="lang" value="c++">C++
    <input type="checkbox" name="lang" value="python">Python
    </td>
    <tr>
      <td>Email:</td>
      <td><input type="email" name="email" placeholder="Enter email"></td>
    </tr>

    <tr>
      <td>Password:</td>
      <td><input type="password" name="password" placeholder="Enter password"></td>
    </tr>
    <td>
     <tr>
     <td>Please choose a file :</td>
     <td><input type="file" name="file"></td>
     <tr>
     <td>
        <input type="submit" name="submit" value="submit">
        <input type="reset" name="reset" value="reset">
     </td>
     </tr>
    </table>
    </form>
    </center>
</body>
</html>
