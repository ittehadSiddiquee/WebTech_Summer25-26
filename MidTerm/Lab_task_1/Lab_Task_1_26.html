<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career development office</title>
</head>
<body>
    <center>
        <h1>Career Development Office</h1>
        <h1>Confirmation Form</h1>
    <table>
    <tr>
    <td>Student Name:</td>
    <td>
        <input type="text" name="sname" placeholder="Student name">
    </td>
    </tr>
    <tr>
        <td>Email Address:</td>
    <td>
        <input type="email" name="email" placeholder="Your Email">
    </td>
    </tr>
    <tr>
    <td>Preferred Internship Type:</td>
    <td><input type="radio" name="Preferred Internship Type" value="on site"> On-Site
     <input type="radio" name="Preferred Internship Type" value="Remote"> Remote</td>
    
    </td>
    </tr>
<tr>
        <td>Internship Duration:</td>
        <td>
<select id="Internship Duration" name="Internship Duration">
    <option value="6 Weeks">6 Weeks</option>
    <option value="3 Months">3 Months</option>
   </td> 
</select>
</td>
</tr>
    <td>Skills of Interest:</td>
    <td>
    <input type="checkbox" name="skills" value="Web Development">Web Development
    <input type="checkbox" name="skills" value="Data Analysis">Data Analysis
    <input type="checkbox" name="skills" value="Mobile Apps">Mobile Apps
   </td>
   <tr>
    <td>
        <input type="submit" name="submit" value="submit">
        </td>
    </tr>
    
    </center>
    </table>
</body>
</html>
